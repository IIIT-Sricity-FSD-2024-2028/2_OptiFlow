<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Employees — OfficeSync</title>
    <link rel="stylesheet" href="../../css/pm/base.css" />
    <link rel="stylesheet" href="../../css/pm/layout.css" />
    <link rel="stylesheet" href="../../css/pm/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main-area">
        <header class="top-header">
          <h1 class="page-title">Employees</h1>
          <div class="header-actions">
            <div class="search-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                id="emp-search"
                class="search-input"
                placeholder="Search employees..."
              />
            </div>
            <div class="bell-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
            </div>
          </div>
        </header>
        <main class="page-content">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Team Members</div>
              <span class="badge badge-blue" id="emp-count">0 members</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>EMPLOYEE</th>
                    <th>ROLE</th>
                    <th>DEPARTMENT</th>
                    <th>PROJECT</th>
                    <th>STATUS</th>
                  </tr>
                </thead>
                <tbody id="emp-table-body"></tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../../js/data/db.js"></script>

    <script src="../../js/data/pm-data-store.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/validator.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/components/sidebar.js"></script>
    <script src="../../js/components/toast.js"></script>
    <script src="../../js/components/modal.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        window.Auth.requireRole("admin");
        window.Sidebar.render("employees");
        window.Toast.init();
        await render();
        document.getElementById("emp-search").addEventListener("input", render);
      });

      async function render() {
        const state = await window.Helpers.getState();
        const query = document.getElementById("emp-search").value.toLowerCase();
        
        // Filter users who are Team Leaders (5) or Team Members (6)
        const endusers = state.users.filter((u) => {
          const ur = state.userRoles.find(r => String(r.userId) === String(u.userId));
          const isEndUser = ur && (ur.roleId === 5 || ur.roleId === 6);
          
          const dept = state.departments.find(d => String(d.id) === String(u.departmentId));
          const deptName = dept ? dept.name : 'Unknown';

          return isEndUser &&
            (!query ||
              u.fullName.toLowerCase().includes(query) ||
              deptName.toLowerCase().includes(query));
        });

        document.getElementById("emp-count").textContent =
          endusers.length + " members";

        const tbody = document.getElementById("emp-table-body");
        tbody.innerHTML =
          endusers
            .map((u) => {
              const userTasks = state.tasks.filter(t => String(t.assignedUserId) === String(u.userId));
              const proj = state.projects.find((p) =>
                userTasks.some(t => String(t.projectId) === String(p.projectId))
              );
              
              const dept = state.departments.find(d => String(d.id) === String(u.departmentId));
              const deptName = dept ? dept.name : '—';
              
              const ur = state.userRoles.find(r => String(r.userId) === String(u.userId));
              const roleDisplay = ur && ur.roleId === 5 ? "Team Leader" : "Team Member";

              return `<tr>
                <td>
                  <div style="display:flex;align-items:center;gap:10px">
                    <div class="avatar avatar-sm avatar-${u.avatarColor || 'blue'}">${u.avatar}</div>
                    <div>
                      <div class="td-label">${u.fullName}</div>
                      <div class="td-sub">${u.email}</div>
                    </div>
                  </div>
                </td>
                <td>${roleDisplay}</td>
                <td>${deptName}</td>
                <td>${proj ? `<a href="tasks.html?project=${proj.id}" style="color:var(--blue);font-weight:500">${proj.name}</a>` : '<span class="text-muted">—</span>'}</td>
                <td><span class="badge ${window.Helpers.statusClass(u.status)}">${u.status}</span></td>
              </tr>`;
            })
            .join("") ||
          `<tr><td colspan="5"><div class="empty-state" style="padding:40px;text-align:center;color:#64748b"><div class="empty-state-text">No employees found</div></div></td></tr>`;
      }
    </script>
  </body>
</html>
