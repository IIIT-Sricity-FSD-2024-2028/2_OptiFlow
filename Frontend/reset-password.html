<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OfficeSync - Reset Password</title>
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <header class="auth-header">
      <img src="assets/images/logo.svg" alt="OfficeSync" height="30" />
      <nav>
        <a href="index.html">Home</a><a href="index.html#features">Features</a
        ><a href="about.html">About Us</a><a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="auth-main">
      <div class="auth-card" style="text-align: center">
        <div class="auth-header-text">
          <div
            style="
              background: var(--bg-blue);
              width: 48px;
              height: 48px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              margin: 0 auto 1rem;
            "
          >
            🔄
          </div>
          <h1>Reset your password</h1>
          <p>Please enter and confirm your new password below.</p>
        </div>
        <form id="resetForm">
          <div class="input-group" style="text-align: left">
            <label>New Password</label>
            <div class="password-input-group" style="position: relative">
              <input
                type="password"
                id="resetNew"
                class="form-control"
                placeholder="New Password"
                required
              />
              <button
                type="button"
                class="password-toggle-btn"
                onclick="togglePassword('resetNew', this)"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  background: none;
                  border: none;
                  cursor: pointer;
                  color: #64748b;
                "
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
                <svg
                  style="display: none"
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>

          <div class="input-group" style="text-align: left; margin-top: 1rem">
            <label>Confirm Password</label>
            <div class="password-input-group" style="position: relative">
              <input
                type="password"
                id="resetConfirm"
                class="form-control"
                placeholder="Confirm Password"
                required
              />
              <button
                type="button"
                class="password-toggle-btn"
                onclick="togglePassword('resetConfirm', this)"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  background: none;
                  border: none;
                  cursor: pointer;
                  color: #64748b;
                "
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
                <svg
                  style="display: none"
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-btn" style="margin-top: 1.5rem">
            Reset Password
          </button>
        </form>
        <div class="bottom-text" style="margin-top: 2rem">
          <a
            href="login.html"
            style="color: var(--text-muted); font-weight: normal"
            >← Return to Sign In</a
          >
        </div>
      </div>
    </main>

    <footer class="auth-footer">
      <div>© 2026 OfficeSync Inc. All rights reserved.</div>
      <div class="auth-footer-links">
        <a href="#">Privacy Policy</a><a href="#">Terms of Service</a
        ><a href="#">Cookie Settings</a>
      </div>
    </footer>
    <script src="js/pages/auth-flows.js"></script>
  </body>
</html>
