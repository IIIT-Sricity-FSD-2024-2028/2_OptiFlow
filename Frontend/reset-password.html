<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OfficeSync - Reset Password</title>
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <header class="auth-header">
      <img src="assets/images/logo.svg" alt="OfficeSync" height="30" />
      <nav>
        <a href="index.html">Home</a><a href="#">Features</a
        ><a href="#">About Us</a><a href="#">Contact</a>
      </nav>
    </header>

    <main class="auth-main">
      <div class="auth-card" style="text-align: center">
        <div class="auth-header-text">
          <div
            style="
              background: var(--bg-blue);
              width: 48px;
              height: 48px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              margin: 0 auto 1rem;
            "
          >
            🔄
          </div>
          <h1>Reset your password</h1>
          <p>Please enter and confirm your new password below.</p>
        </div>
        <form id="resetForm">
          <div class="input-group" style="text-align: left">
            <label>New Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="resetNew"
                placeholder="••••••••"
                required
                minlength="6"
              />
              <button
                type="button"
                class="toggle-password"
                onclick="toggleVisibility('resetNew')"
              >
                👁️
              </button>
            </div>
          </div>
          <div class="input-group" style="text-align: left">
            <label>Confirm Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="resetConfirm"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="toggle-password"
                onclick="toggleVisibility('resetConfirm')"
              >
                👁️
              </button>
            </div>
          </div>
          <button type="submit" class="auth-btn">Reset Password</button>
        </form>
        <div class="bottom-text" style="margin-top: 2rem">
          <a
            href="login.html"
            style="color: var(--text-muted); font-weight: normal"
            >← Return to Sign In</a
          >
        </div>
      </div>
    </main>

    <footer class="auth-footer">
      <div>© 2026 OfficeSync Inc. All rights reserved.</div>
      <div class="auth-footer-links">
        <a href="#">Privacy Policy</a><a href="#">Terms of Service</a
        ><a href="#">Cookie Settings</a>
      </div>
    </footer>
    <script src="js/pages/auth-flows.js"></script>
  </body>
</html>
