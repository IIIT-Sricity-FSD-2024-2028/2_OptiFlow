<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Escalations — OfficeSync</title>
    <link rel="stylesheet" href="../../css/pm/base.css" />
    <link rel="stylesheet" href="../../css/pm/layout.css" />
    <link rel="stylesheet" href="../../css/pm/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-area">
        <header class="top-header">
          <h1 class="page-title">Escalations</h1>
          <span class="badge badge-orange" id="esc-count">3 open</span>
          <div class="header-actions">
            <button class="btn btn-primary btn-sm" id="btn-add-esc">
              + New Escalation
            </button>
            <div class="bell-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
            </div>
          </div>
        </header>

        <main class="page-content page-content-split animate-in">
          <div class="master-pane">
            <div
              style="
                padding: 16px 20px 0;
                border-bottom: 1px solid var(--border);
                background: var(--card-bg);
              "
            >
              <div
                class="filter-tabs"
                id="esc-tabs"
                style="margin-bottom: 0; border-bottom: none"
              >
                <div class="filter-tab active" data-filter="all">All (3)</div>
                <div class="filter-tab" data-filter="high">High (2)</div>
                <div class="filter-tab" data-filter="resolved">
                  Resolved (0)
                </div>
              </div>
            </div>
            <div id="escalation-list" style="padding: 0 16px"></div>
          </div>

          <div class="detail-pane" id="escalation-detail-pane">
            <div class="empty-state" style="margin-top: 20vh">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
              <div class="empty-state-text" id="esc-detail-empty-text">
                Select an escalation to view details
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../../js/data/db.js"></script>

    <script src="../../js/data/pm-data-store.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/validator.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/components/sidebar.js"></script>
    <script src="../../js/components/toast.js"></script>
    <script src="../../js/components/modal.js"></script>
    <script>
      let state,
        escalations,
        activeFilter = "all";

      document.addEventListener("DOMContentLoaded", () => {
        window.Auth.requireRole("admin");
        window.Sidebar.render("escalations");
        window.Toast.init();

        state = window.Helpers.getState();
        escalations = state.escalations;
        renderList();
        bindEvents();
      });

      function renderList() {
        let items = [...escalations];
        if (activeFilter === "high")
          items = items.filter((e) => e.priority === "high");
        if (activeFilter === "resolved")
          items = items.filter((e) => e.status === "resolved");
        if (activeFilter === "all")
          items = items.filter((e) => e.status === "open");

        const open = escalations.filter((e) => e.status === "open").length;
        const high = escalations.filter(
          (e) => e.priority === "high" && e.status === "open",
        ).length;
        const resolved = escalations.filter(
          (e) => e.status === "resolved",
        ).length;
        document.getElementById("esc-count").textContent = open + " open";

        const tabs = document.querySelectorAll("#esc-tabs .filter-tab");
        tabs[0].textContent = `All (${open})`;
        tabs[1].textContent = `High (${high})`;
        tabs[2].textContent = `Resolved (${resolved})`;

        const container = document.getElementById("escalation-list");
        if (items.length === 0) {
          container.innerHTML = `<div class="empty-state" style="padding:40px 0"><div class="empty-state-text">No escalations</div></div>`;
          return;
        }

        container.innerHTML = items
          .map(
            (e) => `
    <div class="escalation-item" style="padding:16px 12px; border-bottom:1px solid #f1f5f9; ${activeEscalationId === e.id ? "background:#f8fafc; border-radius: var(--r-sm); margin:4px 0;" : ""}" onclick="selectEscalation(${e.id})">
      <div class="escalation-header">
        <span class="escalation-from">${e.from}</span>
        <span class="escalation-date">${e.date}</span>
      </div>
      <div class="escalation-title">${e.title}</div>
      <div class="escalation-meta">${e.projectName} · Blocker: ${e.blocker}</div>
      <div class="escalation-badges">
        <span class="badge badge-${e.priority === "high" ? "red" : "orange"}">${e.priorityLabel}</span>
        <span class="badge badge-${e.status === "open" ? "gray" : "green"}">${e.statusLabel}</span>
      </div>
    </div>`,
          )
          .join("");
      }

      let activeEscalationId = null;

      function selectEscalation(id) {
        activeEscalationId = id;
        renderList();
        renderDetail(id);
      }

      function renderDetail(id) {
        const e = escalations.find((x) => x.id === id);
        if (!e) return;

        const pane = document.getElementById("escalation-detail-pane");
        pane.innerHTML = `
    <div style="background:var(--card-bg); max-width:800px; margin:0 auto; padding:32px 40px; border-radius:var(--r-xl); box-shadow:var(--shadow-sm); margin-top:16px; min-height:80vh;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:32px; border-bottom:1px solid var(--border); padding-bottom:16px;">
        <h2 style="font-size:20px; font-weight:800; color:var(--text-primary); margin:0;">${e.title}</h2>
        <span class="badge badge-${(e.priority || "").toLowerCase() === "high" ? "red" : "orange"}" style="padding:6px 12px; font-size:12px;">${e.priorityLabel || e.priority} Priority</span>
      </div>
      
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px; margin-bottom:32px;">
        <div>
          <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px;">Escalated By</div>
          <div style="font-size:14px; font-weight:500; color:var(--text-primary); margin-top:4px;">${e.from}</div>
        </div>
        <div>
          <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px;">Project</div>
          <div style="font-size:14px; font-weight:500; color:var(--text-primary); margin-top:4px;">${e.projectName}</div>
        </div>
        <div>
          <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px;">Type</div>
          <div style="font-size:14px; font-weight:500; color:var(--text-primary); margin-top:4px;">Blocker — ${e.blocker}</div>
        </div>
        <div>
          <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px;">Status</div>
          <div style="font-size:14px; font-weight:500; color:var(--text-primary); margin-top:4px;">${e.statusLabel}</div>
        </div>
        <div>
          <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px;">Escalated On</div>
          <div style="font-size:14px; font-weight:500; color:var(--text-primary); margin-top:4px;">${e.date}</div>
        </div>
      </div>

      <div style="margin-bottom:32px;">
        <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px;">Escalation Notes</div>
        <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:var(--r-lg); padding:20px; font-size:13px; color:var(--text-primary); line-height:1.6;">
          ${e.description || "No description provided."}
        </div>
      </div>

   ${
     e.status === "open"
       ? `
      <div style="margin-bottom:32px;">
        <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px;">Your Response / Resolution *</div>
        <textarea id="esc-resolution" class="form-textarea" placeholder="Enter resolution notes, reassignment details, or next steps..." style="height:120px; font-size:13px;"></textarea>
        <span class="form-error hidden" id="esc-resolution-error">Resolution notes cannot be left blank.</span>
      </div>`
       : ""
   }

      <div style="display:flex; gap:16px;">
        <button class="btn btn-secondary btn-lg" style="flex:1; justify-content:center;" onclick="window.location.href='tasks.html?project=${e.projectId}'">View Project</button>
        ${
          e.status === "open"
            ? `<button class="btn btn-success btn-lg" style="flex:1; justify-content:center; background:#16a34a; color:white; border:none;" onclick="resolveEscalation(${e.id})">Mark Resolved</button>`
            : '<div style="flex:1; text-align:center; color:var(--green); font-weight:600; padding:10px; background:var(--green-bg); border-radius:var(--r); border:1px solid var(--green-border);">Resolved</div>'
        }
      </div>
    </div>
  `;
      }
      function bindEvents() {
        document.querySelectorAll("#esc-tabs .filter-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelectorAll("#esc-tabs .filter-tab")
              .forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            activeFilter = tab.dataset.filter;
            renderList();
          });
        });

        document
          .getElementById("btn-add-esc")
          ?.addEventListener("click", openAddModal);
      }

      function openAddModal() {
        const state2 = window.Helpers.getState();
        window.Modal.create({
          id: "modal-add-esc",
          title: "Report New Escalation",
          body: `
      <div class="form-group">
        <label class="form-label" for="esc-title">Title *</label>
        <input type="text" id="esc-title" class="form-input" placeholder="Brief description of the blocker">
        <span class="form-error hidden" id="esc-title-error"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="esc-desc">Description *</label>
        <textarea id="esc-desc" class="form-textarea" placeholder="Explain what's blocked and why..."></textarea>
        <span class="form-error hidden" id="esc-desc-error"></span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="esc-project">Project *</label>
          <select id="esc-project" class="form-select">
            <option value="">Select project</option>
            ${state2.projects.map((p) => `<option value="${p.id}">${p.name}</option>`).join("")}
          </select>
          <span class="form-error hidden" id="esc-project-error"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="esc-priority">Priority *</label>
          <select id="esc-priority" class="form-select">
            <option value="">Select priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <span class="form-error hidden" id="esc-priority-error"></span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="esc-blocker">Blocker Type</label>
        <input type="text" id="esc-blocker" class="form-input" placeholder="e.g. Access Issue, Resource Unavailable">
      </div>`,
          footerHTML: `
      <button class="btn btn-secondary btn-sm" onclick="window.Modal.close('modal-add-esc')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitEscalation()">Submit Escalation</button>`,
        });
        window.Validator.attachLive("esc-title", {
          required: true,
          minLength: 5,
        });
        window.Validator.attachLive("esc-desc", {
          required: true,
          minLength: 10,
        });
        window.Validator.attachLive("esc-project", { required: true });
        window.Validator.attachLive("esc-priority", { required: true });
      }

      function submitEscalation() {
        const result = window.Validator.validateForm({
          "esc-title": { required: true, minLength: 5 },
          "esc-desc": { required: true, minLength: 10 },
          "esc-project": { required: true },
          "esc-priority": { required: true },
        });
        if (!result.valid) return;

        const session = window.Auth.getSession();
        const projId = parseInt(window.Helpers.getVal("esc-project"));
        const proj = state.projects.find((p) => p.id === projId);
        const priority = window.Helpers.getVal("esc-priority");
        const priorityMap = { high: "High", medium: "Medium", low: "Low" };

        const newEsc = {
          id: window.Helpers.nextId(state.escalations),
          from:
            session.name + (session.subRole === "team_leader" ? " (TL)" : ""),
          title: window.Helpers.getVal("esc-title"),
          description: window.Helpers.getVal("esc-desc"),
          projectId: projId,
          projectName: proj ? proj.name : "—",
          blocker: window.Helpers.getVal("esc-blocker") || "Unknown",
          priority,
          priorityLabel: priorityMap[priority],
          status: "open",
          statusLabel: "Open",
          date: "Today",
        };

        state.escalations.push(newEsc);
        escalations = state.escalations;
        window.Helpers.saveState(state);
        window.Helpers.log(`Logged escalation "${newEsc.title}"`, "Escalation");
        window.Modal.close("modal-add-esc");
        window.Toast.success(
          "Escalation Reported",
          "The escalation has been logged.",
        );
        renderList();
      }

      function resolveEscalation(id) {
        // ✅ STRICT VALIDATION CHECK
        const result = window.Validator.validateForm({
          "esc-resolution": { required: true },
        });
        if (!result.valid) {
          window.Toast.error(
            "Missing Information",
            "You must enter resolution notes before closing this.",
          );
          return;
        }

        const idx = state.escalations.findIndex((e) => e.id === id);
        if (idx === -1) return;

        // Grab the notes to save them
        const resolutionNotes = document.getElementById("esc-resolution").value;

        state.escalations[idx].status = "resolved";
        state.escalations[idx].statusLabel = "Resolved";
        // Optionally save the notes into the object so you can view them later!
        state.escalations[idx].resolutionNotes = resolutionNotes;

        escalations = state.escalations;
        window.Helpers.saveState(state);
        window.Helpers.log(`Resolved escalation #${id}`, "Escalation");
        window.Toast.success("Resolved", "Escalation has been resolved.");
        renderList();
        renderDetail(id); // Re-render to hide the text box
      }
      function deleteEscalation(id) {
        window.Modal.confirm({
          title: "Dismiss Escalation",
          message: "Are you sure you want to dismiss this escalation?",
          confirmLabel: "Dismiss",
          onConfirm: () => {
            state.escalations = state.escalations.filter((e) => e.id !== id);
            escalations = state.escalations;
            window.Helpers.saveState(state);
            renderList();
            window.Toast.warning("Dismissed", "Escalation has been dismissed.");
          },
        });
      }
    </script>
  </body>
</html>
