<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Compliance Status — OfficeSync</title>
    <link rel="stylesheet" href="../../css/pm/base.css" />
    <link rel="stylesheet" href="../../css/pm/layout.css" />
    <link rel="stylesheet" href="../../css/pm/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-area">
        <header class="top-header">
          <h1 class="page-title">Compliance Status</h1>
          <div class="header-actions">
            <div class="bell-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
            </div>
          </div>
        </header>

        <main class="page-content">
          <!-- Stats -->
          <div class="stats-row" id="compliance-stats"></div>

          <!-- Per-Project Breakdown -->
          <div class="card" style="margin-bottom: 16px">
            <div class="card-header">
              <div class="card-title">Per-Project Compliance Breakdown</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>PROJECT</th>
                    <th>POLICY</th>
                    <th>STATUS</th>
                    <th>EVIDENCE</th>
                    <th>LAST AUDITED</th>
                    <th>ACTION</th>
                  </tr>
                </thead>
                <tbody id="compliance-table-body"></tbody>
              </table>
            </div>
          </div>

          <!-- Active Violations -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">Active Violations</div>
              <span class="badge badge-orange" id="violation-count-badge"
                >2 open</span
              >
            </div>
            <div class="card-body" id="violations-list"></div>
          </div>
        </main>
      </div>
    </div>

    <script src="../../js/data/db.js"></script>
    <script src="../../js/data/pm-data-store.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/validator.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/components/sidebar.js"></script>
    <script src="../../js/components/toast.js"></script>
    <script src="../../js/components/modal.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        window.Auth.requireRole("admin");
        window.Sidebar.render("compliance");
        window.Toast.init();

        const state = window.Helpers.getState();
        const items = state.complianceItems;
        const viol = state.activeViolations;
        const clear = items.filter((i) => i.status === "clear").length;
        const atRisk = items.filter((i) => i.status === "at_risk").length;
        const violation = items.filter((i) => i.status === "violation").length;
        const score = Math.round((clear / items.length) * 100) || 74;

        // Stats
        document.getElementById("compliance-stats").innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Compliance Score</div>
      <div class="stat-value"><div class="stat-number">${score}%</div></div>
      <div class="stat-sub ${score >= 80 ? "green" : score >= 60 ? "orange" : "red"}">${score >= 80 ? "Fully compliant" : score >= 60 ? "Needs attention" : "At risk"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Clear Projects</div>
      <div class="stat-value"><div class="stat-number">${clear}</div></div>
      <div class="stat-sub green">Fully compliant</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Violations</div>
      <div class="stat-value"><div class="stat-number">${viol.length}</div></div>
      <div class="stat-sub ${viol.length > 0 ? "red" : "green"}">${viol.length > 0 ? "Open flags" : "None"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending Reviews</div>
      <div class="stat-value"><div class="stat-number">4</div></div>
      <div class="stat-sub orange">Awaiting audit</div>
    </div>`;

        // Compliance table
        const actionMap = {
          violation: `<button class="btn btn-primary btn-sm" onclick="window.Toast.info('Action Taken','Compliance action initiated.')">Take Action</button>`,
          at_risk: `<button class="btn btn-secondary btn-sm" onclick="window.Toast.info('Review','Opening compliance review...')">Review</button>`,
          clear: `<span style="color:var(--text-muted);font-size:12px;cursor:pointer" onclick="window.Toast.info('Report','Viewing compliance report...')">View</span>`,
        };

        document.getElementById("compliance-table-body").innerHTML = items
          .map(
            (item) => `
    <tr>
      <td>
        <div class="td-label">${item.projectName}</div>
        <div class="td-sub">${item.projectSub}</div>
      </td>
      <td><span style="font-size:13px;font-weight:500">${item.policy}</span></td>
      <td><span class="badge ${window.Helpers.statusClass(item.status)}">${item.statusLabel}</span></td>
      <td><span class="badge ${window.Helpers.statusClass(item.evidence)}">${item.evidenceLabel}</span></td>
      <td>
        <span ${item.hasWarning ? 'style="color:var(--orange);font-weight:600"' : ""}>${item.lastAudited}${item.hasWarning ? " ⚠" : ""}</span>
      </td>
      <td>${actionMap[item.status] || ""}</td>
    </tr>`,
          )
          .join("");

        // Badge
        document.getElementById("violation-count-badge").textContent =
          viol.length + " open";

        // Violations list
        document.getElementById("violations-list").innerHTML =
          viol
            .map(
              (v) => `
    <div class="violation-item">
      <div class="violation-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="violation-content">
        <div class="violation-title">${v.title}</div>
        <div class="violation-detail">${v.projectName} · ${v.detail}</div>
      </div>
      <div class="violation-actions">
        <span class="badge ${v.severity === "overdue" ? "badge-red" : "badge-orange"}">${v.severityLabel}</span>
        ${
          v.action === "take_action"
            ? `<button class="btn btn-primary btn-sm" onclick="resolveViolation(${v.id})">Take Action</button>`
            : `<button class="btn btn-secondary btn-sm" onclick="window.Toast.info('Monitoring','Violation is being tracked.')">Monitor</button>`
        }
      </div>
    </div>`,
            )
            .join("") ||
          '<div class="empty-state"><div class="empty-state-text">No active violations</div></div>';
      });

      function resolveViolation(id) {
        const state = window.Helpers.getState();
        state.activeViolations = state.activeViolations.filter(
          (v) => v.id !== id,
        );
        window.Helpers.saveState(state);
        window.Helpers.log(`Resolved violation #${id}`, "Compliance");
        window.Toast.success(
          "Action Taken",
          "Violation has been escalated for resolution.",
        );
        setTimeout(() => window.location.reload(), 1200);
      }
    </script>
  </body>
</html>
