<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Evidence Vault — OfficeSync</title>
    <link rel="stylesheet" href="../../css/pm/base.css" />
    <link rel="stylesheet" href="../../css/pm/layout.css" />
    <link rel="stylesheet" href="../../css/pm/components.css" />
    <style>
      /* Document Preview Styles */
      .doc-preview {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 40px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 200px;
        margin-bottom: 24px;
      }
      .doc-icon {
        width: 48px;
        height: 48px;
        color: var(--blue);
        margin-bottom: 16px;
      }
      .doc-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 4px;
      }
      .doc-meta {
        font-size: 12px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-area">
        <header class="top-header">
          <h1 class="page-title">Evidence Vault</h1>
          <div class="header-actions">
            <div class="bell-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
            </div>
          </div>
        </header>

        <main class="page-content page-content-split">
          <div class="master-pane">
            <div
              style="
                padding: 16px 20px 0;
                border-bottom: 1px solid var(--border);
                background: var(--card-bg);
              "
            >
              <div
                class="filter-tabs"
                id="vault-tabs"
                style="margin-bottom: 0; border-bottom: none"
              >
                <div class="filter-tab active" data-filter="pending">
                  Pending Review (0)
                </div>
                <div class="filter-tab" data-filter="approved">
                  Approved (0)
                </div>
                <div class="filter-tab" data-filter="rejected">
                  Rejected (0)
                </div>
              </div>
            </div>

            <div id="evidence-list" style="padding: 0 16px"></div>
          </div>

          <div class="detail-pane" id="evidence-detail-pane">
            <div class="empty-state" style="margin-top: 20vh">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                ></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
              <div class="empty-state-text">Select an item to review</div>
              <div class="empty-state-sub">
                Choose a pending document from the list.
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <div
      id="reject-modal"
      class="modal-overlay hidden"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.6);
        z-index: 9999;
        align-items: center;
        justify-content: center;
      "
    >
      <div
        class="modal"
        style="
          background: #fff;
          width: 100%;
          max-width: 500px;
          border-radius: 12px;
          box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        "
      >
        <div
          class="modal-header"
          style="padding: 20px 24px; border-bottom: 1px solid var(--border)"
        >
          <div
            class="modal-title"
            style="font-size: 16px; font-weight: 700; color: #b91c1c"
          >
            Reject Evidence
          </div>
        </div>
        <div class="modal-body" style="padding: 24px">
          <div
            style="
              background: #fef2f2;
              color: #991b1b;
              padding: 12px;
              border-radius: 8px;
              font-size: 13px;
              margin-bottom: 20px;
            "
          >
            The submitter will be notified that their evidence was rejected and
            they must resubmit.
          </div>
          <div class="form-group">
            <label class="form-label" for="reject-reason"
              >Reason for Rejection *</label
            >
            <textarea
              id="reject-reason"
              class="form-textarea"
              placeholder="Explain why this evidence is insufficient or incorrect..."
              style="height: 100px"
            ></textarea>
            <span
              class="form-error hidden"
              id="reject-reason-error"
              style="color: #ef4444; font-size: 12px; margin-top: 4px"
              >You must provide a reason.</span
            >
          </div>
        </div>
        <div
          class="modal-footer"
          style="
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
          "
        >
          <button class="btn btn-secondary" onclick="closeRejectModal()">
            Cancel
          </button>
          <button
            class="btn btn-danger"
            style="background: #ef4444; color: white"
            onclick="confirmReject()"
          >
            Confirm Rejection
          </button>
        </div>
      </div>
    </div>

    <script src="../../js/data/db.js"></script>
    <script src="../../js/data/pm-data-store.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/validator.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/components/sidebar.js"></script>
    <script src="../../js/components/toast.js"></script>
    <script src="../../js/components/modal.js"></script>

    <script>
      let state,
        activeFilter = "pending",
        activeEvidenceId = null,
        currentRejectId = null;
      let session;

      document.addEventListener("DOMContentLoaded", () => {
        if (!sessionStorage.getItem("currentUser")) {
          window.location.replace("../login.html"); // Adjust path depending on your folder structure
          return;
        }

        session = window.Auth.getSession();

        // ✅ SECURITY: Kick out regular Team Members (Role 5). Allow PMs (2) and TLs (4).
        if (session.roleId === 5) {
          window.location.replace("member-dashboard.html");
          return;
        }

        window.Sidebar.render("compliance");
        window.Toast.init();

        state = window.Helpers.getState();
        if (!state.evidence) state.evidence = [];

        bindEvents();
        renderList();
      });

      function bindEvents() {
        document.querySelectorAll("#vault-tabs .filter-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelectorAll("#vault-tabs .filter-tab")
              .forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            activeFilter = tab.dataset.filter;
            activeEvidenceId = null;
            document.getElementById("evidence-detail-pane").innerHTML = `
              <div class="empty-state" style="margin-top: 20vh">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                  <line x1="16" y1="13" x2="8" y2="13"></line>
                  <line x1="16" y1="17" x2="8" y2="17"></line>
                  <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <div class="empty-state-text">Select an item to review</div>
              </div>`;
            renderList();
          });
        });
      }

      function renderList() {
        const masterUsers = JSON.parse(localStorage.getItem("users")) || [];

        // ✅ HIERARCHY FILTERING: Determine who this user is allowed to see
        let allowedUserIds = [];
        if (session.roleId === 4) {
          // Team Leader: Only see direct reports
          const myTeam = masterUsers.filter(
            (u) => String(u.reportsTo) === String(session.id),
          );
          allowedUserIds = myTeam.map((u) => String(u.id));
        } else {
          // PM or Superuser: See everyone
          allowedUserIds = masterUsers.map((u) => String(u.id));
        }

        // ✅ Apply Role Filter AND Tab Filter
        let items = state.evidence.filter((e) => {
          // 1. Check if the logged-in user is allowed to see this evidence
          if (!allowedUserIds.includes(String(e.userId))) return false;

          // 2. Check which tab is active
          if (activeFilter === "pending")
            return e.status === "pending" || e.status === "under_review";
          return e.status === activeFilter;
        });

        // Update Tab Counts dynamically
        const allMyAllowedEvidence = state.evidence.filter((e) =>
          allowedUserIds.includes(String(e.userId)),
        );
        const pendingCount = allMyAllowedEvidence.filter(
          (e) => e.status === "pending" || e.status === "under_review",
        ).length;
        const approvedCount = allMyAllowedEvidence.filter(
          (e) => e.status === "approved",
        ).length;
        const rejectedCount = allMyAllowedEvidence.filter(
          (e) => e.status === "rejected",
        ).length;

        const tabs = document.querySelectorAll("#vault-tabs .filter-tab");
        tabs[0].textContent = `Pending Review (${pendingCount})`;
        tabs[1].textContent = `Approved (${approvedCount})`;
        tabs[2].textContent = `Rejected (${rejectedCount})`;

        const container = document.getElementById("evidence-list");
        if (items.length === 0) {
          container.innerHTML = `<div class="empty-state" style="padding:40px 0"><div class="empty-state-text">No ${activeFilter} items</div></div>`;
          return;
        }

        container.innerHTML = items
          .map((e) => {
            const submitter = masterUsers.find(
              (u) => String(u.id) === String(e.userId),
            ) || { name: "Unknown User" };
            let badgeClass = "badge-gray";
            if (e.status === "pending" || e.status === "under_review")
              badgeClass = "badge-orange";
            if (e.status === "approved") badgeClass = "badge-green";
            if (e.status === "rejected") badgeClass = "badge-red";

            return `
            <div style="padding:16px 12px; border-bottom:1px solid #f1f5f9; cursor:pointer; ${activeEvidenceId === e.id ? "background:#f8fafc; border-radius: var(--r-sm); margin:4px 0;" : ""}" onclick="selectEvidence(${e.id})">
              <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                <span style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">${submitter.name}</span>
                <span style="font-size:11px; color:var(--text-muted);">${e.submittedOn}</span>
              </div>
              <div style="font-size:14px; font-weight:600; color:var(--text-primary); margin-bottom:4px;">${e.title}</div>
              <div style="font-size:12px; color:var(--text-secondary); margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Task: ${e.taskName || "General Submission"}</div>
              <div style="display:flex; gap:8px;">
                <span class="badge ${badgeClass}">${e.statusLabel || e.status}</span>
                <span class="badge badge-gray">${e.type}</span>
              </div>
            </div>`;
          })
          .join("");
      }

      function selectEvidence(id) {
        activeEvidenceId = id;

        // Mark as "under review" if it was just pending
        const evIdx = state.evidence.findIndex((x) => x.id === id);
        if (evIdx > -1 && state.evidence[evIdx].status === "pending") {
          state.evidence[evIdx].status = "under_review";
          state.evidence[evIdx].statusLabel = "Under Review";
          window.Helpers.saveState(state);
        }

        renderList();
        renderDetail(id);
      }

      function renderDetail(id) {
        const e = state.evidence.find((x) => x.id === id);
        if (!e) return;

        const masterUsers = JSON.parse(localStorage.getItem("users")) || [];
        const submitter = masterUsers.find(
          (u) => String(u.id) === String(e.userId),
        ) || { name: "Unknown User", email: "" };

        const pane = document.getElementById("evidence-detail-pane");
        pane.innerHTML = `
          <div style="background:var(--card-bg); max-width:800px; margin:0 auto; padding:32px 40px; border-radius:var(--r-xl); box-shadow:var(--shadow-sm); margin-top:16px; min-height:80vh;">
            
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; border-bottom:1px solid var(--border); padding-bottom:16px;">
              <div>
                <h2 style="font-size:20px; font-weight:800; color:var(--text-primary); margin:0 0 4px 0;">${e.title}</h2>
                <div style="font-size:13px; color:var(--text-muted);">Submitted by ${submitter.name} on ${e.submittedOn}</div>
              </div>
              <span class="badge ${e.status === "approved" ? "badge-green" : e.status === "rejected" ? "badge-red" : "badge-orange"}" style="padding:6px 12px; font-size:12px;">${e.statusLabel || e.status}</span>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px; margin-bottom:32px;">
              <div>
                <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px;">Related Task</div>
                <div style="font-size:14px; font-weight:500; color:var(--text-primary); margin-top:4px;">${e.taskName || "N/A"}</div>
              </div>
              <div>
                <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px;">Evidence Type</div>
                <div style="font-size:14px; font-weight:500; color:var(--text-primary); margin-top:4px;">${e.type}</div>
              </div>
            </div>

            <div class="doc-preview">
              <svg class="doc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
              <div class="doc-name">${e.file || "attached_evidence_document.pdf"}</div>
              <div class="doc-meta">Secure File · 2.4 MB</div>
              <button class="btn btn-secondary btn-sm" style="margin-top:16px;" onclick="window.Toast.info('Download Started', 'Fetching file from secure vault...')">Download to View</button>
            </div>

            <div style="margin-bottom:32px;">
              <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px;">Submitter Notes</div>
              <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:var(--r-lg); padding:20px; font-size:13px; color:var(--text-primary); line-height:1.6; font-style:italic;">
                "${e.notes || "No notes provided."}"
              </div>
            </div>

            ${
              e.status === "rejected"
                ? `
            <div style="margin-bottom:32px;">
              <div style="font-size:10px; font-weight:700; color:#ef4444; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px;">Rejection Reason</div>
              <div style="background:#fef2f2; border:1px solid #fecaca; border-radius:var(--r-lg); padding:20px; font-size:13px; color:#991b1b; line-height:1.6;">
                ${e.rejectReason || "No reason recorded."}
              </div>
            </div>
            `
                : ""
            }

            ${
              e.status === "pending" || e.status === "under_review"
                ? `
            <div style="display:flex; gap:16px; border-top:1px solid var(--border); padding-top:24px;">
              <button class="btn btn-danger btn-lg" style="flex:1; justify-content:center; background:white; color:#ef4444; border:1px solid #ef4444;" onclick="openRejectModal(${e.id})">Reject & Return</button>
              <button class="btn btn-success btn-lg" style="flex:1; justify-content:center; background:#10b981; color:white; border:none;" onclick="approveEvidence(${e.id})">Approve Evidence</button>
            </div>`
                : ""
            }
          </div>
        `;
      }

      function approveEvidence(id) {
        const evIdx = state.evidence.findIndex((x) => x.id === id);
        if (evIdx === -1) return;

        state.evidence[evIdx].status = "approved";
        state.evidence[evIdx].statusLabel = "Approved";

        window.Helpers.saveState(state);
        window.Helpers.log(`Approved evidence #${id}`, "Compliance");
        window.Toast.success(
          "Evidence Approved",
          "The compliance record has been verified.",
        );

        notifySubmitter(
          state.evidence[evIdx].userId,
          "Evidence Approved",
          `Your submission "${state.evidence[evIdx].title}" was approved by ${session.name}.`,
          "success",
        );

        renderList();
        renderDetail(id);
      }

      function openRejectModal(id) {
        currentRejectId = id;
        document.getElementById("reject-reason").value = "";
        document.getElementById("reject-reason-error").style.display = "none";
        document.getElementById("reject-modal").style.display = "flex";
      }

      function closeRejectModal() {
        document.getElementById("reject-modal").style.display = "none";
        currentRejectId = null;
      }

      function confirmReject() {
        const reason = document.getElementById("reject-reason").value.trim();
        const errorSpan = document.getElementById("reject-reason-error");

        if (!reason) {
          errorSpan.style.display = "block";
          errorSpan.classList.remove("hidden");
          return;
        }

        const evIdx = state.evidence.findIndex((x) => x.id === currentRejectId);
        if (evIdx === -1) return;

        state.evidence[evIdx].status = "rejected";
        state.evidence[evIdx].statusLabel = "Rejected";
        state.evidence[evIdx].rejectReason = reason;

        window.Helpers.saveState(state);
        window.Helpers.log(
          `Rejected evidence #${currentRejectId}. Reason: ${reason}`,
          "Compliance",
        );
        window.Toast.warning(
          "Evidence Rejected",
          "The submitter has been notified to try again.",
        );

        notifySubmitter(
          state.evidence[evIdx].userId,
          "Evidence Rejected",
          `Your submission "${state.evidence[evIdx].title}" was rejected by ${session.name}.`,
          "error",
        );

        closeRejectModal();
        renderList();
        renderDetail(currentRejectId);
      }

      function notifySubmitter(userId, title, message, type) {
        let notifications =
          JSON.parse(localStorage.getItem("system_notifications")) || [];
        notifications.push({
          id: Date.now(),
          targetUserId: String(userId),
          title: title,
          message: message,
          type: type,
          date: "Just now",
          read: false,
        });
        localStorage.setItem(
          "system_notifications",
          JSON.stringify(notifications),
        );
      }
    </script>
  </body>
</html>
