<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>HR Dashboard — OfficeSync</title>
    <link rel="stylesheet" href="../../css/pm/base.css" />
    <link rel="stylesheet" href="../../css/pm/layout.css" />
    <link rel="stylesheet" href="../../css/pm/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main-area">
        <header class="top-header">
          <h1 class="page-title">HR Dashboard</h1>
        </header>
        <main class="page-content">
          <div class="stats-row" id="hr-stats"></div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px">
            <div class="card">
              <div class="card-header">
                <div class="card-title">Department Overview</div>
              </div>
              <div class="card-body" id="dept-overview"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <div class="card-title">Team Workload</div>
              </div>
              <div class="card-body" id="workload-panel"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../../js/data/db.js"></script>

    <script src="../../js/data/pm-data-store.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/validator.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/components/sidebar.js"></script>
    <script src="../../js/components/toast.js"></script>
    <script src="../../js/components/modal.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        protectPage(["hr_manager"]);
        window.Sidebar.render("dashboard");
        window.Toast.init();

        const state = window.Helpers.getState();
        const endusers = state.users.filter((u) => u.role === "enduser");
        const active = endusers.filter((u) => u.status === "active").length;
        const tls = endusers.filter((u) => u.subRole === "team_leader").length;
        const members = endusers.filter((u) => u.subRole === "member").length;

        document.getElementById("hr-stats").innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Employees</div><div class="stat-value"><div class="stat-number">${endusers.length}</div></div><div class="stat-sub blue">In system</div></div>
    <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value"><div class="stat-number">${active}</div></div><div class="stat-sub green">Currently active</div></div>
    <div class="stat-card"><div class="stat-label">Team Leaders</div><div class="stat-value"><div class="stat-number">${tls}</div></div><div class="stat-sub blue">TL role</div></div>
    <div class="stat-card"><div class="stat-label">Team Members</div><div class="stat-value"><div class="stat-number">${members}</div></div><div class="stat-sub blue">Member role</div></div>`;

        const depts = state.departments;
        document.getElementById("dept-overview").innerHTML = depts
          .map(
            (d) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f5f9">
      <div><div style="font-size:13px;font-weight:600">${d.name}</div><div style="font-size:11px;color:var(--text-muted)">Head: ${d.head}</div></div>
      <span class="badge badge-blue">${d.memberCount} members</span>
    </div>`,
          )
          .join("");

        document.getElementById("workload-panel").innerHTML = endusers
          .map((u) => {
            const taskCount = state.tasks.filter(
              (t) => t.assignedUserId === u.id,
            ).length;
            return `<div class="team-member">
      <div class="avatar avatar-md avatar-${u.avatarColor}">${u.avatar}</div>
      <div class="team-member-info"><div class="team-member-name">${u.name}</div><div class="team-member-role">${u.subRole === "team_leader" ? "Team Leader" : "Team Member"}</div></div>
      <div class="team-member-tasks">${taskCount} tasks</div>
    </div>`;
          })
          .join("");
      });
    </script>
  </body>
</html>
