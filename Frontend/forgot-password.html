<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OfficeSync - Forgot Password</title>
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <header class="auth-header">
      <img src="assets/images/logo.svg" alt="OfficeSync" height="30" />
      <nav>
        <a href="index.html">Home</a><a href="index.html#features">Features</a
        ><a href="about.html">About Us</a><a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="auth-main">
      <div class="auth-card" style="text-align: center">
        <div class="auth-header-text">
          <div
            style="
              background: var(--bg-blue);
              width: 48px;
              height: 48px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              margin: 0 auto 1rem;
            "
          >
            ✉️
          </div>
          <h1>Forgot your password?</h1>
          <p>Enter your work email and we will send you a reset link.</p>
        </div>
        <form id="forgotForm">
          <div class="input-group" style="text-align: left">
            <label>Work Email</label>
            <input
              type="email"
              id="forgotEmail"
              placeholder="@ admin@company.com"
              required
            />
          </div>
          <button type="submit" class="auth-btn">Send Reset Link</button>
        </form>
        <div class="bottom-text" style="margin-top: 2rem">
          <a
            href="login.html"
            style="color: var(--text-muted); font-weight: normal"
            >← Back to Sign In</a
          >
        </div>
      </div>
    </main>

    <footer class="auth-footer">
      <div>© 2026 OfficeSync Inc. All rights reserved.</div>
      <div class="auth-footer-links">
        <a href="#">Privacy Policy</a><a href="#">Terms of Service</a
        ><a href="#">Cookie Settings</a>
      </div>
    </footer>
    <script src="js/pages/auth-flows.js"></script>
  </body>
</html>
