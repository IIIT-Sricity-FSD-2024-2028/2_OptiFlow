<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OfficeSync - Login</title>
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>
    <header class="auth-header">
      <img src="assets/images/logo.svg" alt="OfficeSync" height="30" />
      <nav>
        <a href="index.html">Home</a><a href="index.html#features">Features</a
        ><a href="about.html">About Us</a><a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div class="auth-header-text">
          <p
            style="
              text-transform: uppercase;
              font-size: 0.75rem;
              color: var(--btn-blue);
              font-weight: bold;
            "
          >
            Welcome Back
          </p>
          <h1>Sign in to your account</h1>
        </div>
        <form id="loginForm">
          <div class="input-group">
            <label>Work Email</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="name@company.com"
              required
            />
          </div>
          <div class="input-group">
            <label>Password</label>
            <div class="password-input-group" style="position: relative">
              <input
                type="password"
                id="loginPassword"
                class="form-control"
                placeholder="Password"
              />

              <button
                type="button"
                class="password-toggle-btn"
                onclick="togglePassword('loginPassword', this)"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  background: none;
                  border: none;
                  cursor: pointer;
                  color: #64748b;
                "
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
                <svg
                  style="display: none"
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>
          <div class="auth-links">
            <label><input type="checkbox" /> Keep me signed in</label>
            <a href="forgot-password.html">Forgot password?</a>
          </div>
          <button type="submit" class="auth-btn">Sign In</button>
          <div class="divider">OR</div>
          <button
            type="button"
            class="auth-btn-outline"
            onclick="showAuthMessage('loginForm', 'SSO Integration Pending', 'info')"
          >
            🏢 Sign in with Organization SSO
          </button>
        </form>
        <div class="bottom-text">
          New organization? <a href="register.html">Register your company</a>
        </div>
      </div>
    </main>

    <footer class="auth-footer">
      <div>© 2026 OfficeSync Inc. All rights reserved.</div>
      <div class="auth-footer-links">
        <a href="#">Privacy Policy</a><a href="#">Terms of Service</a
        ><a href="#">Cookie Settings</a>
      </div>
    </footer>

    <script src="js/utils/helpers.js"></script>
    <script src="js/data/db.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/pages/auth-flows.js"></script>
  </body>
</html>
