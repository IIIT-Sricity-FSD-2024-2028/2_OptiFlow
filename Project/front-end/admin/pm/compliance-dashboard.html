<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Compliance Status — OfficeSync</title>
    <link rel="stylesheet" href="../../css/pm/base.css" />
    <link rel="stylesheet" href="../../css/pm/layout.css" />
    <link rel="stylesheet" href="../../css/pm/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-area">
        <header class="top-header">
          <h1 class="page-title">Compliance Status</h1>
          <div class="header-actions">
            <div class="bell-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
            </div>
          </div>
        </header>

        <main class="page-content">
          <div class="stats-row" id="compliance-stats"></div>

          <div class="card" style="margin-bottom: 24px">
            <div class="card-header">
              <div class="card-title">Per-Project Compliance Breakdown</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>PROJECT</th>
                    <th>POLICY</th>
                    <th>STATUS</th>
                    <th>EVIDENCE</th>
                    <th>LAST AUDITED</th>
                    <th>ACTION</th>
                  </tr>
                </thead>
                <tbody id="compliance-table-body"></tbody>
              </table>
            </div>
          </div>

          <div class="card" id="violations-section">
            <div class="card-header">
              <div class="card-title">Active Violations</div>
              <span class="badge badge-orange" id="violation-count-badge"
                >0 open</span
              >
            </div>
            <div
              class="card-body"
              id="violations-list"
              style="padding: 0"
            ></div>
          </div>
        </main>
      </div>
    </div>

    <script src="../../js/data/db.js"></script>
    <script src="../../js/data/pm-data-store.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/validator.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/components/sidebar.js"></script>
    <script src="../../js/components/toast.js"></script>
    <script src="../../js/components/modal.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        if (!sessionStorage.getItem("currentUser")) {
          window.location.replace("../../login.html");
          return;
        }
        window.Auth.requireRole("admin");
        window.Sidebar.render("compliance");
        window.Toast.init();

        await renderPage();
      });

      async function renderPage() {
        const state = await window.Helpers.getState();
        const items = state.complianceItems || [];
        // Only show violations that haven't been resolved yet
        const viol = (state.complianceViolations || []).filter(
          (v) => v.status !== "Resolved",
        );

        const clear = items.filter((i) => i.status === "Resolved").length;
        const score =
          items.length > 0 ? Math.round((clear / items.length) * 100) : 100;

        // ✅ DYNAMIC PENDING REVIEWS: Count actual pending evidence from the vault
        const pendingEvidenceCount = (state.evidence || []).filter(
          (e) => e.status === "Pending" || e.status === "Under_Review",
        ).length;

        // Stats
        document.getElementById("compliance-stats").innerHTML = `
          <div class="stat-card">
            <div class="stat-label">Compliance Score</div>
            <div class="stat-value"><div class="stat-number">${score}%</div></div>
            <div class="stat-sub ${score >= 80 ? "green" : score >= 60 ? "orange" : "red"}">${score >= 80 ? "Fully compliant" : score >= 60 ? "Needs attention" : "At risk"}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Resolved Violations</div>
            <div class="stat-value"><div class="stat-number">${clear}</div></div>
            <div class="stat-sub green">Fully compliant</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active Violations</div>
            <div class="stat-value"><div class="stat-number">${viol.length}</div></div>
            <div class="stat-sub ${viol.length > 0 ? "red" : "green"}">${viol.length > 0 ? "Open flags" : "None"}</div>
          </div>
          <div class="stat-card" style="cursor:pointer;" onclick="window.location.href='evidence-review.html'">
            <div class="stat-label">Pending Reviews</div>
            <div class="stat-value"><div class="stat-number">${pendingEvidenceCount}</div></div>
            <div class="stat-sub ${pendingEvidenceCount > 0 ? "orange" : "green"}">${pendingEvidenceCount > 0 ? "Awaiting audit →" : "All caught up"}</div>
          </div>`;

        // ✅ LOGICAL ACTIONS: Redirect to vault or scroll to violation
        const actionMap = {
          violation: `<button class="btn btn-danger btn-sm" onclick="document.getElementById('violations-section').scrollIntoView({behavior: 'smooth'})">Resolve Below ↓</button>`,
          at_risk: `<button class="btn btn-secondary btn-sm" onclick="window.location.href='evidence-review.html'">Review Evidence</button>`,
          clear: `<button class="btn btn-ghost btn-sm" onclick="window.location.href='evidence-review.html'">View Vault</button>`,
        };

        // Build table from compliance violations with rule lookups
        const tbody = document.getElementById("compliance-table-body");
        if (viol.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-state-text">No compliance items tracked.</div></div></td></tr>`;
        } else {
          tbody.innerHTML = viol
            .map(
              (item) => {
                const rule = state.complianceRules.find(r => String(r.ruleId) === String(item.ruleId));
                const ruleName = rule ? rule.name : `Rule #${item.ruleId}`;
                const severity = rule ? rule.severity : 'Medium';
                const isOverdue = item.dueDate && new Date(item.dueDate) < new Date();
                const detectedDate = window.Helpers.formatDate(item.detectedAt);
                const statusBadge = item.status === 'Resolved' ? 'status-done' : item.status === 'Under_Review' ? 'badge-orange' : 'badge-red';
                // Look up linked evidence count
                const linkedEvidence = (state.evidence || []).filter(e => String(e.violationId) === String(item.violationId));
                const evidenceLabel = linkedEvidence.length > 0 ? `${linkedEvidence.length} file(s)` : 'None';
                const evidenceBadge = linkedEvidence.length > 0 ? 'status-active' : 'badge-gray';
                const actionBtn = item.status === 'Open'
                  ? `<button class="btn btn-danger btn-sm" onclick="document.getElementById('violations-section').scrollIntoView({behavior:'smooth'})">Resolve ↓</button>`
                  : item.status === 'Under_Review'
                  ? `<button class="btn btn-secondary btn-sm" onclick="window.location.href='evidence-review.html'">Review Evidence</button>`
                  : `<button class="btn btn-ghost btn-sm" onclick="window.location.href='evidence-review.html'">View Vault</button>`;
                return `
            <tr>
              <td>
                <div class="td-label">${item.entityType} #${item.entityId}</div>
                <div class="td-sub">General</div>
              </td>
              <td><span style="font-size:13px;font-weight:500">${ruleName}</span></td>
              <td><span class="badge ${statusBadge}">${item.status}</span></td>
              <td><span class="badge ${evidenceBadge}">${evidenceLabel}</span></td>
              <td>
                <span style="color:${isOverdue ? 'var(--orange)' : 'var(--text-muted)'}; font-weight:${isOverdue ? 600 : 400}">${detectedDate}${isOverdue ? ' ⚠' : ''}</span>
              </td>
              <td>${actionBtn}</td>
            </tr>`;
              },
            )
            .join("");
        }

        // Violation Badge
        document.getElementById("violation-count-badge").textContent =
          viol.length + " open";
        document.getElementById("violation-count-badge").className =
          viol.length > 0 ? "badge badge-red" : "badge badge-green";

        // Violations list
        document.getElementById("violations-list").innerHTML =
          viol
            .map(
              (v) => {
                // Lookup rule name for title
                const rule = state.complianceRules.find(r => String(r.ruleId) === String(v.ruleId));
                const vTitle = rule ? rule.name : `Violation #${v.violationId}`;
                const vDetail = `${v.entityType || 'Entity'} #${v.entityId || '—'}`;
                const severityLabel = rule ? rule.severity : v.status;
                const isOverdue = v.dueDate && new Date(v.dueDate) < new Date();
                return `
          <div style="display:flex; align-items:flex-start; gap:16px; padding:20px 24px; border-bottom:1px solid var(--border);">
            <div style="width:32px; height:32px; background:#fef2f2; color:#ef4444; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; height:16px;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div style="flex:1;">
              <div style="font-size:14px; font-weight:600; color:var(--text-primary); margin-bottom:4px;">${vTitle}</div>
              <div style="font-size:12px; color:var(--text-muted);">System Audit · ${vDetail}</div>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
              <span class="badge ${isOverdue ? 'badge-red' : 'badge-orange'}">${severityLabel}</span>
              <button class="btn btn-primary btn-sm" onclick="openResolveModal('${v.id}')">Take Action</button>
            </div>
          </div>`;
              },
            )
            .join("") ||
          '<div class="empty-state" style="padding:40px 0;"><div class="empty-state-text">No active violations</div><div class="empty-state-sub">All compliance checks passed.</div></div>';
      }

      // ✅ NEW: Strict Resolution Modal
      function openResolveModal(id) {
        window.Modal.create({
          id: "modal-resolve-violation",
          title: "Resolve Compliance Violation",
          body: `
            <div style="margin-bottom:16px; font-size:13px; color:var(--text-secondary); background:#eff6ff; padding:12px; border-radius:8px; border:1px solid #bfdbfe;">
              Please provide details on how this violation was addressed or mitigated. This will be permanently logged for audit purposes.
            </div>
            <div class="form-group">
              <label class="form-label" for="violation-notes">Resolution Notes *</label>
              <textarea id="violation-notes" class="form-textarea" placeholder="Describe the actions taken to clear this violation..."></textarea>
              <span class="form-error hidden" id="violation-notes-error">Resolution notes cannot be empty.</span>
            </div>
          `,
          footerHTML: `
            <button class="btn btn-secondary btn-sm" onclick="window.Modal.close('modal-resolve-violation')">Cancel</button>
            <button class="btn btn-primary btn-sm" style="background:var(--green); border-color:var(--green);" onclick="submitViolationResolution('${id}')">Mark Resolved</button>
          `,
        });
      }

      async function submitViolationResolution(id) {
        const result = window.Validator.validateForm({
          "violation-notes": { required: true, minLength: 5 },
        });
        if (!result.valid) {
          window.Toast.error(
            "Missing Info",
            "Detailed resolution notes are required.",
          );
          return;
        }

        const notes = document.getElementById("violation-notes").value;
        const state = await window.Helpers.getState();

        try {
          // 1. Send the resolution to the backend API
          await window.Helpers.api.request(`/compliance-violations/${id}`, "PATCH", {
            status: "Resolved",
            resolution_remarks: notes,
            resolved_at: new Date().toISOString()
          });

          // 2. Update local state for immediate UI reflection
          const vIdx = state.complianceViolations.findIndex((v) => String(v.id) === String(id));
          if (vIdx > -1) {
            state.complianceViolations[vIdx].status = "Resolved";
            state.complianceViolations[vIdx].statusLabel = "Resolved";
            state.complianceViolations[vIdx].resolutionRemarks = notes;
            state.complianceViolations[vIdx].resolvedAt = new Date().toISOString();
          }

          window.Helpers.log(
            `Resolved compliance violation #${id}. Notes: ${notes}`,
            "Compliance",
          );
          window.Modal.close("modal-resolve-violation");
          window.Toast.success(
            "Violation Resolved",
            "The compliance audit log has been updated.",
          );

          // Refresh the UI
          renderPage();
        } catch (err) {
          window.Toast.error("Failed to Resolve", err.message || "An API error occurred");
        }
      }
    </script>
  </body>
</html>
