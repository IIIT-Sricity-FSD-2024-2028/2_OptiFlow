<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfficeSync - Violations</title>
    <meta
      name="description"
      content="OfficeSync Compliance Officer – Review open and resolved compliance violations with full detail view."
    />
    <link rel="stylesheet" href="../../css/compliance/base.css" />
    <link rel="stylesheet" href="../../css/compliance/layout.css" />
    <link rel="stylesheet" href="../../css/compliance/components.css" />
    <link rel="stylesheet" href="../../css/compliance/compliance.css" />
    <link rel="stylesheet" href="../../css/compliance/violations.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <script src="../../js/data/db.js"></script>
    <script src="../../js/data/pm-data-store.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/validator.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/components/sidebar.js"></script>
    <script src="../../js/components/toast.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        protectPage(["compliance_officer"]);
      });

      // --- 2. BULLETPROOF LOGOUT OVERRIDE ---
      // This forces the logout button to clear everything and jump back exactly 2 folders.
      window.Auth = window.Auth || {};
      window.Auth.logout = function () {
        sessionStorage.removeItem("currentUser");
        localStorage.removeItem("currentUser"); // Clears any lingering local storage auth
        window.location.replace("../../login.html");
      };
    </script>
  </head>
  <body class="violations-page">
    <div class="admin-layout">
      <!-- ===== SIDEBAR ===== -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- ===== MAIN CONTENT ===== -->
      <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
          <div class="page-title">Violations</div>
          <div class="header-actions">
            <!-- Bell icon -->
            <button
              class="btn-icon"
              id="btn-notifications"
              style="position: relative"
              aria-label="Notifications"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
            </button>
          </div>
        </header>

        <div class="content-wrapper">
          <div class="violations-layout">
            <!-- ===== LEFT: VIOLATIONS QUEUE ===== -->
            <section class="violations-queue" aria-label="Violations Queue">
              <div class="violations-queue-header">
                <h1 class="violations-queue-title">Violations</h1>
                <span class="queue-pending-count">2 open</span>
              </div>

              <div class="pill-tabs" id="violationTabs">
                <div class="pill-tab active" data-tab="open">Open (2)</div>
                <div class="pill-tab" data-tab="resolved">Resolved (1)</div>
                <div class="pill-tab" data-tab="all">All</div>
              </div>

              <ul class="violations-queue-list" id="violationsList" role="list">
                <!-- Dynamically rendered by violations.js -->
              </ul>
            </section>

            <!-- ===== RIGHT: VIOLATION DETAIL ===== -->
            <section
              class="violation-detail"
              id="violationDetail"
              aria-label="Violation Detail"
            >
              <div class="vd-content">
                <!-- Header -->
                <div class="vd-header">
                  <h2 class="vd-title" id="vdTitle">Select a violation</h2>
                  <span class="badge" id="vdBadge"></span>
                </div>

                <!-- Info Grid -->
                <div class="vd-info-grid">
                  <div class="vd-info-cell">
                    <span class="vd-info-label">Policy</span>
                    <span class="vd-info-value" id="vdPolicy">—</span>
                  </div>
                  <div class="vd-info-cell">
                    <span class="vd-info-label">Entity</span>
                    <span class="vd-info-value" id="vdProject">—</span>
                  </div>
                  <div class="vd-info-cell">
                    <span class="vd-info-label">Reported By</span>
                    <span class="vd-info-value" id="vdPM">—</span>
                  </div>
                  <div class="vd-info-cell">
                    <span class="vd-info-label">Resolved By</span>
                    <span class="vd-info-value" id="vdTL">—</span>
                  </div>
                  <div class="vd-info-cell">
                    <span class="vd-info-label">Detected On</span>
                    <span class="vd-info-value danger" id="vdSince">—</span>
                  </div>
                  <div class="vd-info-cell">
                    <span class="vd-info-label">Risk Level</span>
                    <span class="vd-info-value danger" id="vdRisk">—</span>
                  </div>
                </div>

                <!-- Violation Description -->
                <div class="vd-section">
                  <div class="vd-section-label">Violation Description</div>
                  <div class="vd-text-box" id="vdDescription">—</div>
                </div>

                <!-- Notes / Actions -->
                <div class="vd-section">
                  <div class="vd-section-label">Your Notes / Actions</div>
                  <textarea class="vd-notes-box" id="vdNotes" placeholder="Add resolution notes..."></textarea>
                </div>
              </div>
              <!-- /vd-content -->

              <!-- Sticky footer actions -->
              <div class="vd-footer">
                <button
                  class="btn-view-project"
                  id="btn-view-project"
                  onclick="viewProject()"
                >
                  View Project
                </button>
                <button
                  class="btn-escalate"
                  id="btn-escalate"
                  onclick="escalateViolation()"
                >
                  Escalate
                </button>
                <button
                  class="btn-mark-resolved"
                  id="btn-mark-resolved"
                  onclick="markResolved()"
                >
                  Mark Resolved
                </button>
              </div>
            </section>
            <!-- /violation-detail -->
          </div>
          <!-- /violations-layout -->
        </div>
        <!-- /content-wrapper -->
      </main>
    </div>
    <!-- /admin-layout -->

    <script src="../../js/pages/compliance/violations.js"></script>
  </body>
</html>
