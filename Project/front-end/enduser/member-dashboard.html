<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Team Member — Execution · OfficeSync</title>
    <meta name="description" content="Team Member execution workspace — OfficeSync" />
    <link rel="stylesheet" href="../css/pm/base.css" />
    <link rel="stylesheet" href="../css/pm/layout.css" />
    <link rel="stylesheet" href="../css/pm/components.css" />
    <style>
      #member-stats .stat-card {
        min-height: 104px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 20px;
        border-radius: var(--r-lg, 12px);
        background: var(--card-bg, #fff);
        border: 1px solid var(--border);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      }
      #tm-execution-actions {
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }
      #member-stats .stat-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }
      #member-stats .stat-number {
        font-size: 26px;
        font-weight: 700;
        color: var(--text-primary);
      }
      #member-stats .stat-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
      }
      .dashboard-member-main {
        max-width: 1280px;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main-area">
        <header class="top-header">
          <div>
            <h1 class="page-title">My work</h1>
            <div style="font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:500">
              Execution · tasks assigned to you · submit work, evidence, blockers
            </div>
          </div>
          <div class="header-actions">
            <div id="reporting-badge-area"></div>
            <div class="bell-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
            </div>
          </div>
        </header>

        <main class="page-content dashboard-member-main">
          <div
            id="debug-banner"
            style="
              display: none;
              background: #fee2e2;
              color: #b91c1c;
              padding: 16px;
              border-radius: 8px;
              margin-bottom: 20px;
              border: 1px solid #f87171;
              font-weight: 600;
            "
          ></div>

          <div
            id="tm-execution-actions"
            style="
              display: flex;
              flex-wrap: wrap;
              gap: 12px;
              margin-bottom: 24px;
              padding: 16px;
              background: var(--card-bg, #fff);
              border: 1px solid var(--border);
              border-radius: var(--r, 10px);
            "
          ></div>

          <div
            id="member-stats"
            style="
              display: grid;
              grid-template-columns: repeat(5, 1fr);
              gap: 16px;
              margin-bottom: 24px;
            "
          ></div>

          <div style="display: grid; grid-template-columns: 1fr 340px; gap: 24px">
            <div style="display: flex; flex-direction: column; gap: 24px">
              <div class="card" style="align-self: start">
                <div
                  class="card-header"
                  style="border-bottom: none; padding-bottom: 8px"
                >
                  <div class="card-title" style="font-size: 14px">
                    Today's tasks (your assignments)
                  </div>
                  <a
                    href="my-tasks.html"
                    class="card-action"
                    style="font-size: 12px; color: var(--blue)"
                    >View all →</a
                  >
                </div>
                <div style="padding: 0 20px 20px" id="member-tasks-list"></div>
              </div>

              <div class="card" id="tm-report-blocker">
                <div class="card-header" style="background: #fffbfa; border-bottom: 1px solid #ffedd5">
                  <div>
                    <div class="card-title" style="color: var(--orange)">Report blocker</div>
                    <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px">
                      Escalate a dependency or outage to your Team Leader.
                    </div>
                  </div>
                </div>
                <div class="card-body">
                  <div style="display: flex; flex-direction: column; gap: 12px">
                    <div class="form-group" style="margin: 0">
                      <label class="form-label" for="member-esc-task">Task *</label>
                      <select id="member-esc-task" class="form-select"></select>
                    </div>
                    <div class="form-group" style="margin: 0">
                      <label class="form-label" for="member-esc-quick-title">Issue title *</label>
                      <input
                        type="text"
                        id="member-esc-quick-title"
                        class="form-input"
                        placeholder="Brief description of the blocker"
                      />
                      <span class="form-error hidden" id="member-esc-quick-title-error"></span>
                    </div>
                    <div class="form-group" style="margin: 0">
                      <label class="form-label" for="member-esc-quick-blocker">Blocker type</label>
                      <select id="member-esc-quick-blocker" class="form-select">
                        <option value="Access Issue">Access / permission</option>
                        <option value="Dependency">Dependency delay</option>
                        <option value="Approval">Awaiting approval</option>
                        <option value="System Issue">System outage / bug</option>
                      </select>
                    </div>
                    <div style="display: flex; gap: 12px; align-items: flex-end">
                      <div class="form-group" style="margin: 0; flex: 1">
                        <label class="form-label" for="member-esc-quick-priority">Priority</label>
                        <select id="member-esc-quick-priority" class="form-select">
                          <option value="high">High</option>
                          <option value="medium" selected>Medium</option>
                          <option value="low">Low</option>
                        </select>
                      </div>
                      <button
                        type="button"
                        class="btn btn-primary"
                        style="height: 38px"
                        onclick="window.MemberDashboard.raiseEscalation()"
                      >
                        Submit alert
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 24px">
              <div class="card">
                <div class="card-header" style="border-bottom: none">
                  <div class="card-title" style="font-size: 14px">Upcoming deadlines</div>
                </div>
                <div class="card-body" style="display: flex; flex-direction: column; gap: 16px" id="upcoming-deadlines"></div>
              </div>

              <div class="card">
                <div class="card-header" style="border-bottom: none">
                  <div class="card-title" style="font-size: 14px">Compliance & evidence</div>
                </div>
                <div class="card-body" id="compliance-activity" style="padding-top: 0"></div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/data/db.js"></script>
    <script src="../js/data/pm-data-store.js"></script>
    <script src="../js/tasks-store.js"></script>
    <script src="../js/utils/auth.js"></script>
    <script src="../js/utils/helpers.js"></script>
    <script src="../js/components/sidebar.js"></script>
    <script src="../js/components/toast.js"></script>
    <script src="../js/components/modal.js"></script>
    <script src="./member-dashboard.js"></script>
  </body>
</html>
