<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Projects — OfficeSync</title>
    <meta
      name="description"
      content="All Projects — OfficeSync Project Manager"
    />
    <link rel="stylesheet" href="../../css/pm/base.css" />
    <link rel="stylesheet" href="../../css/pm/layout.css" />
    <link rel="stylesheet" href="../../css/pm/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-area">
        <header
          class="top-header"
          style="
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 32px;
          "
        >
          <h1
            class="page-title"
            style="font-size: 20px; font-weight: 700; color: #0f172a; margin: 0"
          >
            Projects
          </h1>
          <div class="header-actions">
            <div
              class="bell-btn"
              style="
                border: 1px solid #e2e8f0;
                background: #fff;
                color: #64748b;
                padding: 8px;
                border-radius: 8px;
                cursor: pointer;
              "
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                width="18"
                height="18"
              >
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
            </div>
          </div>
        </header>

        <main class="page-content">
          <div
            class="filters-bar"
            style="
              margin-top: 24px;
              display: flex;
              gap: 16px;
              align-items: center;
              flex-wrap: wrap;
            "
          >
            <div style="flex: 1; min-width: 240px; position: relative">
              <svg
                style="
                  position: absolute;
                  left: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  color: #94a3b8;
                "
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                id="project-search"
                placeholder="Search projects..."
                class="form-input"
                style="
                  padding-left: 36px;
                  background: #fff;
                  border: none;
                  border-radius: 8px;
                  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
                  height: 38px;
                  width: 100%;
                "
              />
            </div>

            <div
              style="
                display: flex;
                gap: 4px;
                background: transparent;
                border-radius: 8px;
              "
            >
              <div
                class="filter-tab active"
                data-filter="all"
                data-label="All"
                style="
                  padding: 8px 16px;
                  font-size: 13px;
                  font-weight: 600;
                  cursor: pointer;
                  border-radius: 6px;
                  transition: all 0.2s;
                "
              >
                All (3)
              </div>
              <div
                class="filter-tab"
                data-filter="active"
                data-label="Active"
                style="
                  padding: 8px 16px;
                  font-size: 13px;
                  font-weight: 600;
                  cursor: pointer;
                  border-radius: 6px;
                  transition: all 0.2s;
                  color: #64748b;
                "
              >
                Active (2)
              </div>
              <div
                class="filter-tab"
                data-filter="on_hold"
                data-label="At Risk"
                style="
                  padding: 8px 16px;
                  font-size: 13px;
                  font-weight: 600;
                  cursor: pointer;
                  border-radius: 6px;
                  transition: all 0.2s;
                  color: #64748b;
                "
              >
                At Risk (1)
              </div>
              <div
                class="filter-tab"
                data-filter="completed"
                data-label="Completed"
                style="
                  padding: 8px 16px;
                  font-size: 13px;
                  font-weight: 600;
                  cursor: pointer;
                  border-radius: 6px;
                  transition: all 0.2s;
                  color: #64748b;
                "
              >
                Completed (0)
              </div>
            </div>

            <select
              id="dept-filter"
              class="form-select"
              style="
                width: 200px;
                background: #fff;
                border: none;
                border-radius: 8px;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
                height: 38px;
                padding-left: 12px;
              "
            >
              <option value="">All Departments</option>
              <!-- populated dynamically -->
            </select>
          </div>

          <style>
            .filter-tab.active {
              background: #fff;
              color: #2563eb;
              box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            }
            .filter-tab:hover:not(.active) {
              background: #f1f5f9;
              color: #0f172a;
            }
          </style>

          <!-- Projects Grid -->
          <div
            class="projects-grid"
            id="projects-grid"
            style="
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
              gap: 24px;
              padding-top: 16px;
            "
          ></div>
        </main>
      </div>
    </div>

    <script src="../../js/data/db.js"></script>

    <script src="../../js/data/pm-data-store.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/validator.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/components/sidebar.js"></script>
    <script src="../../js/components/toast.js"></script>
    <script src="../../js/components/modal.js"></script>
    <script src="../../js/pages/pm/projects.js"></script>
  </body>
</html>
