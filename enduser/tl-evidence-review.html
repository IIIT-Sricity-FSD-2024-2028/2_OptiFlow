<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Team Evidence Vault — OfficeSync</title>
    <link rel="stylesheet" href="../css/pm/base.css" />
    <link rel="stylesheet" href="../css/pm/layout.css" />
    <link rel="stylesheet" href="../css/pm/components.css" />
    <style>
      .doc-preview {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 40px;
        text-align: center;
        min-height: 200px;
        margin-bottom: 24px;
      }
      .doc-icon {
        width: 48px;
        height: 48px;
        color: var(--blue);
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main-area">
        <header class="top-header">
          <h1 class="page-title">Team Evidence Vault</h1>
          <div class="header-actions">
            <div class="bell-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
            </div>
          </div>
        </header>

        <main class="page-content page-content-split">
          <div class="master-pane">
            <div
              style="
                padding: 16px 20px 0;
                border-bottom: 1px solid var(--border);
                background: var(--card-bg);
              "
            >
              <div class="filter-tabs" id="vault-tabs">
                <div class="filter-tab active" data-filter="pending">
                  Pending Review
                </div>
                <div class="filter-tab" data-filter="approved">Approved</div>
              </div>
            </div>
            <div id="evidence-list" style="padding: 0 16px"></div>
          </div>
          <div class="detail-pane" id="evidence-detail-pane">
            <div class="empty-state" style="margin-top: 20vh">
              <div class="empty-state-text">Select team evidence to review</div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/data/db.js"></script>
    <script src="../js/data/pm-data-store.js"></script>
    <script src="../js/utils/auth.js"></script>
    <script src="../js/utils/validator.js"></script>
    <script src="../js/utils/helpers.js"></script>
    <script src="../js/components/sidebar.js"></script>
    <script src="../js/components/toast.js"></script>
    <script src="../js/components/modal.js"></script>

    <script>
      let state,
        session,
        activeFilter = "pending";

      document.addEventListener("DOMContentLoaded", () => {
        session = window.Auth.getSession();
        if (!session || session.roleId !== 4) {
          window.location.replace("../login.html");
          return;
        }
        window.Sidebar.render("dashboard");
        window.Toast.init();
        state = window.Helpers.getState();
        renderList();
      });

      function renderList() {
        const masterUsers = JSON.parse(localStorage.getItem("users")) || [];
        const myTeamIds = masterUsers
          .filter((u) => String(u.reportsTo) === String(session.id))
          .map((u) => String(u.id));

        let items = (state.evidence || []).filter((e) => {
          const isTeamMember = myTeamIds.includes(String(e.userId));
          const matchTab =
            activeFilter === "pending"
              ? e.status === "pending" || e.status === "under_review"
              : e.status === "approved";
          return isTeamMember && matchTab;
        });

        const container = document.getElementById("evidence-list");
        container.innerHTML =
          items
            .map(
              (e) => `
          <div style="padding:16px 12px; border-bottom:1px solid #f1f5f9; cursor:pointer;" onclick="renderDetail(${e.id})">
            <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">${masterUsers.find((u) => u.id === e.userId)?.name}</div>
            <div style="font-size:14px; font-weight:600; color:var(--text-primary);">${e.title}</div>
            <span class="badge ${e.status === "approved" ? "badge-green" : "badge-orange"}">${e.statusLabel}</span>
          </div>`,
            )
            .join("") || '<div class="empty-state">No items found</div>';
      }

      function renderDetail(id) {
        const e = state.evidence.find((x) => x.id === id);
        const pane = document.getElementById("evidence-detail-pane");
        pane.innerHTML = `
          <div style="background:#fff; padding:32px; border-radius:12px; box-shadow:var(--shadow-sm); margin-top:16px;">
            <h2 style="font-size:20px; font-weight:800;">${e.title}</h2>
            <div class="doc-preview">
               <svg class="doc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
               <div>${e.file || "document.pdf"}</div>
            </div>
            <div style="margin-bottom:20px; font-style:italic;">"${e.notes || "No notes"}"</div>
            ${e.status !== "approved" ? `<button class="btn btn-success btn-lg" style="width:100%" onclick="approve(${e.id})">Approve Team Evidence</button>` : '<div class="badge badge-green">Approved</div>'}
          </div>`;
      }

      function approve(id) {
        const idx = state.evidence.findIndex((x) => x.id === id);
        state.evidence[idx].status = "approved";
        state.evidence[idx].statusLabel = "Approved";
        window.Helpers.saveState(state);
        window.Toast.success("Approved", "Evidence verified.");
        renderList();
        document.getElementById("evidence-detail-pane").innerHTML = "";
      }
    </script>
  </body>
</html>
